name: Sensor CI

on:
  push:
    paths:
      - "ghostplc-sensor/**"
      - ".github/workflows/sensor-ci.yml"
  pull_request:
    paths:
      - "ghostplc-sensor/**"
      - ".github/workflows/sensor-ci.yml"

jobs:
  sensor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghostplc-sensor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ghostplc-sensor/collector/requirements.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r collector/requirements.txt pytest
      - run: python -m pytest

