name: Dashboard CI

on:
  push:
    paths:
      - "ghostplc-dashboard/**"
      - ".github/workflows/dashboard-ci.yml"
  pull_request:
    paths:
      - "ghostplc-dashboard/**"
      - ".github/workflows/dashboard-ci.yml"

jobs:
  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ghostplc-dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ghostplc-dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

