services:
  conpot:
    image: ${CONPOT_IMAGE:-honeynet/conpot:latest}
    container_name: ghostplc-conpot
    restart: unless-stopped
    ports:
      - "80:8800"
      - "102:10201"
      - "502:5020"
      - "161:16100/udp"

  cowrie:
    image: cowrie/cowrie:latest
    container_name: ghostplc-cowrie
    restart: unless-stopped
    ports:
      - "2222:2222"
      - "2223:2223"
    environment:
      COWRIE_TELNET_ENABLED: "yes"
